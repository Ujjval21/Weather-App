<!DOCTYPE html>
<html>
<head>
    <title>Weather App 🌦</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
        }

        .box {
            margin-top: 100px;
        }

        input {
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        .result {
            margin-top: 30px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>🌍 Weather App</h1>

        <form method="POST">
            <input type="text" name="city" placeholder="Enter city" required>
            <button type="submit">Search</button>
        </form>

        {% if weather %}
        <div class="result">
            <h2>📍 {{ weather.city }}</h2>
            <p>🌡 Temperature: {{ weather.temp }}°C</p>
            <p>☁ Condition: {{ weather.desc }}</p>
            <p>💧 Humidity: {{ weather.humidity }}%</p>
            <p>💨 Wind: {{ weather.wind }} km/h</p>
        </div>
        {% endif %}
    </div>

</body>
</html>
